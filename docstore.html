<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doc Store – Kash OS</title>
  <style>
    :root {
      --primary: #2e72ef;
      --sidebar: #21243a;
      --sidebar-accent: #21315f;
      --bg: #f7faff;
      --white: #fff;
      --gray: #e7eaf6;
      --text: #2e3652;
      --muted: #6a768d;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 210px;
      background: var(--sidebar);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .sidebar .logo {
      font-weight: 700;
      font-size: 1.3rem;
      padding: 2rem 1.5rem 1rem 1.5rem;
      letter-spacing: -1px;
    }
    .sidebar nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 1rem;
    }
    .sidebar nav a {
      text-decoration: none;
      color: #cfd8ef;
      padding: 0.8rem 1.6rem;
      transition: background .13s;
      border-left: 4px solid transparent;
      font-size: 1.06rem;
      margin-bottom: 2px;
      border-radius: 0 8px 8px 0;
    }
    .sidebar nav a.active, .sidebar nav a:hover {
      background: var(--sidebar-accent);
      border-left: 4px solid var(--primary);
      color: #fff;
    }
    .sidebar .logout {
      padding: 1rem 1.6rem;
      border-top: 1px solid #2a3257;
      color: #b9bfff;
      cursor: pointer;
      background: none;
      font-size: 1rem;
      outline: none;
      border: none;
      margin-top: auto;
      text-align: left;
    }
    .main {
      flex: 1;
      padding: 2.7rem 2.7rem 2rem 2.7rem;
      background: var(--bg);
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .headerbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--white);
      padding: 1rem 1.6rem;
      margin-bottom: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px 0 rgba(46,114,239,.05);
      border: 1px solid var(--gray);
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1.2rem;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #17469a; }
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }
    .doc-card {
      background: var(--white);
      border-radius: 10px;
      border: 1px solid var(--gray);
      padding: 1.2rem 1.1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      box-shadow: 0 1px 6px rgba(60,80,170,0.05);
    }
    .doc-icon { font-size: 2.2rem; }
    .doc-name { font-weight: 600; font-size: 1rem; }
    .doc-meta { font-size: 0.85rem; color: var(--muted); }
    .doc-actions { margin-top: auto; display: flex; gap: 0.5rem; }
    .doc-btn {
      font-size: 0.85rem;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      border: 1px solid var(--border, #cad3f5);
      background: var(--gray);
      cursor: pointer;
      color: var(--text);
    }
    .doc-btn:hover { background: #d0d8f5; }
    .empty {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 2rem;
    }
    @media (max-width: 760px) {
      .sidebar { display: none; }
      .main { padding: 1rem 1vw; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">Kash OS</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
      <a href="dashboard.html#applist" class="active">App List</a>
    </nav>
    <button class="logout">Log Out</button>
  </div>
  <div class="main">
    <div class="headerbar">
      <span>📁 Doc Store</span>
      <button class="btn-primary" onclick="addDoc()">+ Upload Doc</button>
    </div>
    <div class="doc-grid" id="docGrid"></div>
    <p class="empty" id="emptyMsg" style="display:none">No documents yet. Upload your first file!</p>
  </div>
  <script>
    const docs = [
      { name: 'Project Brief.pdf', type: 'PDF', date: 'Apr 3, 2026', icon: '📄' },
      { name: 'Budget 2026.xlsx', type: 'Sheet', date: 'Apr 1, 2026', icon: '📊' },
      { name: 'Meeting Notes.docx', type: 'Doc', date: 'Mar 28, 2026', icon: '📝' },
    ];

    function render() {
      const grid = document.getElementById('docGrid');
      const empty = document.getElementById('emptyMsg');
      if (docs.length === 0) { grid.innerHTML = ''; empty.style.display = ''; return; }
      empty.style.display = 'none';
      grid.innerHTML = docs.map((d, i) => `
        <div class="doc-card">
          <div class="doc-icon">${d.icon}</div>
          <div class="doc-name">${d.name}</div>
          <div class="doc-meta">${d.type} &middot; ${d.date}</div>
          <div class="doc-actions">
            <button class="doc-btn">Open</button>
            <button class="doc-btn" onclick="removeDoc(${i})">Delete</button>
          </div>
        </div>`).join('');
    }

    function addDoc() {
      const name = prompt('Enter document name (e.g. Report.pdf):');
      if (!name) return;
      docs.unshift({ name, type: 'File', date: 'Apr 5, 2026', icon: '📄' });
      render();
    }

    function removeDoc(i) {
      if (confirm('Delete "' + docs[i].name + '"?')) { docs.splice(i, 1); render(); }
    }

    render();
  </script>
</body>
</html>
