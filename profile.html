<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kash OS – Profile</title>
  <style>
    :root {
      --primary: #2e72ef;
      --sidebar: #21243a;
      --sidebar-accent: #21315f;
      --bg: #f7faff;
      --white: #fff;
      --gray: #e7eaf6;
      --text: #2e3652;
      --muted: #6a768d;
      --border: #cad3f5;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 210px;
      background: var(--sidebar);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .sidebar .logo {
      font-weight: 700;
      font-size: 1.3rem;
      padding: 2rem 1.5rem 1rem 1.5rem;
      letter-spacing: -1px;
    }
    .sidebar nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 1rem;
    }
    .sidebar nav a {
      text-decoration: none;
      color: #cfd8ef;
      padding: 0.8rem 1.6rem;
      transition: background .13s;
      border-left: 4px solid transparent;
      font-size: 1.06rem;
      margin-bottom: 2px;
      border-radius: 0 8px 8px 0;
    }
    .sidebar nav a.active, .sidebar nav a:hover {
      background: var(--sidebar-accent);
      border-left: 4px solid var(--primary);
      color: #fff;
    }
    .sidebar .logout {
      padding: 1rem 1.6rem;
      border-top: 1px solid #2a3257;
      color: #b9bfff;
      cursor: pointer;
      background: none;
      font-size: 1rem;
      outline: none;
      border: none;
      margin-top: auto;
      text-align: left;
    }
    .main {
      flex: 1;
      padding: 2.7rem 2.7rem 2rem 2.7rem;
      background: var(--bg);
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .headerbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--white);
      padding: 1rem 1.6rem;
      margin-bottom: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px 0 rgba(46,114,239,.05);
      border: 1px solid var(--gray);
    }
    .headerbar .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 100%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 1rem;
    }
    .profile-card {
      background: var(--white);
      border-radius: 11px;
      border: 1px solid var(--gray);
      box-shadow: 0 1px 6px rgba(60,80,170,0.06);
      padding: 2rem 2.4rem;
      max-width: 480px;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .profile-card h2 {
      margin: 0 0 0.2rem;
      font-size: 1.35rem;
    }
    .profile-card .username {
      color: var(--muted);
      font-size: 0.98rem;
      margin-bottom: 1.4rem;
    }
    .profile-field {
      display: flex;
      flex-direction: column;
      margin-bottom: 1rem;
    }
    .profile-field label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .profile-field span {
      font-size: 1rem;
      font-weight: 500;
    }
    @media (max-width: 760px) {
      .sidebar { display: none; }
      .main { padding: 1rem 1vw; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">Kash OS</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="dashboard.html#applist">App List</a>
    </nav>
    <button class="logout">Log Out</button>
  </div>
  <div class="main">
    <div class="headerbar">
      <div class="user-avatar">AK</div>
      <span>My Profile</span>
    </div>
    <div class="profile-card">
      <div class="profile-avatar">AK</div>
      <h2>askforkris90</h2>
      <div class="username">@askforkris90</div>
      <div class="profile-field">
        <label>Account Tier</label>
        <span>Pro</span>
      </div>
      <div class="profile-field">
        <label>Member Since</label>
        <span>2026</span>
      </div>
      <div class="profile-field">
        <label>Email</label>
        <span>user@kashos.com</span>
      </div>
    </div>
  </div>
</body>
</html>
